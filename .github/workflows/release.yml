name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and publish GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        run: cargo build --release -p gigawattpkg

      - name: Package binaries
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp target/release/gigawattpkg dist/
          cp target/release/gwpkg dist/
          tar -C dist -czf dist/gigawattpkg-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz gigawattpkg gwpkg
          (cd dist && sha256sum gigawattpkg-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz > gigawattpkg-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz.sha256)

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/gigawattpkg-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz
            dist/gigawattpkg-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz.sha256
